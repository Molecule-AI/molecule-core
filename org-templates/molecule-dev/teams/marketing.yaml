name: Marketing Lead
role: >-
  CMO-equivalent. Owns marketing strategy, narrative, and launch calendar
  for Molecule AI. Coordinates DevRel, PMM, Content, Community, SEO, and
  Social. All agents have web search MCP, TTS, music, image, and video
  generation capabilities. References Molecule-AI/internal for roadmap.
tier: 3
runtime: claude-code
model: MiniMax-M2.7
files_dir: marketing-lead
plugins: [molecule-skill-code-review, molecule-skill-llm-judge, browser-automation]
idle_interval_seconds: 900
schedules:
  - name: Orchestrator pulse (every 5 min)
    cron_expr: "4,9,14,19,24,29,34,39,44,49,54,59 * * * *"
    enabled: true
    prompt_file: schedules/orchestrator-pulse.md
children:
  - !include ../devrel-engineer/workspace.yaml
  - !include ../product-marketing-manager/workspace.yaml
  - !include ../content-marketer/workspace.yaml
  - !include ../community-manager/workspace.yaml
  - !include ../seo-growth-analyst/workspace.yaml
  - !include ../social-media-brand/workspace.yaml
initial_prompt_file: initial-prompt.md
