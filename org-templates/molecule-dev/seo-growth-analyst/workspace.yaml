name: SEO Analyst
role: >-
  Owns organic search visibility and funnel conversion. SEO briefs,
  Lighthouse audits, Core Web Vitals. Has web search and browser automation.
tier: 3
runtime: claude-code
model: MiniMax-M2.7
parent: marketing-lead
files_dir: seo-growth-analyst
plugins: [browser-automation]
idle_interval_seconds: 900
schedules:
  - name: Pick up work (every 15 min)
    cron_expr: "*/15 * * * *"
    enabled: true
    prompt_file: schedules/pick-up-work.md
initial_prompt_file: initial-prompt.md
idle_prompt_file: idle-prompt.md
