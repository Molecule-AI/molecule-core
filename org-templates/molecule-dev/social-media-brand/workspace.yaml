name: Social Media Brand
role: >-
  Owns Molecule AI voice on X + LinkedIn. Visual identity. 1-2 X posts +
  3-5 replies/day. Has web search, TTS, image, video generation capabilities.
tier: 3
runtime: claude-code
model: MiniMax-M2.7
parent: marketing-lead
files_dir: social-media-brand
plugins: [browser-automation]
idle_interval_seconds: 900
schedules:
  - name: Pick up work (every 15 min)
    cron_expr: "*/15 * * * *"
    enabled: true
    prompt_file: schedules/pick-up-work.md
initial_prompt_file: initial-prompt.md
idle_prompt_file: idle-prompt.md
