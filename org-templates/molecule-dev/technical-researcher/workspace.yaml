name: Tech Researcher
role: >-
  AI frameworks, protocol evaluation, technology research. Plugin
  curation and technology recommendations.
tier: 3
runtime: claude-code
model: MiniMax-M2.7
parent: research-lead
files_dir: technical-researcher
plugins: [browser-automation]
idle_interval_seconds: 900
schedules:
  - name: Pick up work (every 15 min)
    cron_expr: "*/15 * * * *"
    enabled: true
    prompt_file: schedules/pick-up-work.md
idle_prompt_file: idle-prompt.md
