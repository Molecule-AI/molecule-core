# golangci-lint configuration for workspace-server
version: v2
run:
  timeout: 3m
linters:
  enable-all: false
  disable:
    - errcheck
  enable:
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - unconvert
    - unparam
    - gofmt
    - goimports
    - revive
