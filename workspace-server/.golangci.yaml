# golangci-lint configuration for workspace-server
# errcheck is disabled to avoid blocking CI on pre-existing violations.
version: v2
run:
  timeout: 3m
linters:
  enable:
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - unconvert
    - unparam
    - gofmt
    - goimports
    - revive
