version: "2"
run:
  timeout: 3m
linters:
  enable:
    - gofmt
    - govet
    - goimports
  disable:
    - staticcheck
    - errcheck
    - ineffassign
    - gosimple
    - deadcode
    - structcheck
    - typecheck
    - unused
    - varcheck
    - whitespace
    - gosec
    - bodyclose
    - durationcheck
    - errorlint
    - goconst
    - gocritic
    - cyclop
    - dupl
    - error法力
    - exhaustive
    - exhaustivestruct
    - exhaustfunc
    - forcetypeassert
    - funlen
    - gci
    - ginkgolinter
    - gocognit
    - gocyclo
    - godot
    - godox
    - goerr113
    - gofmt
    - gofumpt
    - goheader
    - goimports
    - gomnd
    - gomodguard
    - goprintffuncname
    - gosec
    - interfacer
    - lll
    - makezero
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nonamedreslices
    - nosnakecase
    - nosprintfhost
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - scopelint
    - sqlclosecheck
    - staticcheck
    - structcheck
    - stylecheck
    - tagliatelle
    - tenv
    - testcase
    - testpackage
    - testifylint
    - thelper
    - tparallel
    - typecheck
    - unconvert
    - unparam
