version: "2"

# CI Platform (Go) lint config.
#
# errcheck is DISABLED. The codebase has hundreds of intentional
# best-effort calls (defer Close, fire-and-forget broadcasts, response
# writes) where wrapping every one in `if err != nil` adds noise without
# changing behavior. Re-enable once a focused effort can audit each call
# site and either handle the error or use the explicit `_ =` form.
#
# All other standard linters stay on (govet, staticcheck, ineffassign,
# unused, gosimple, etc.) — they catch real bugs without the noise tax.
linters:
  default: standard
  disable:
    - errcheck
