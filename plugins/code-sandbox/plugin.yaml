name: code-sandbox
version: 1.0.0
description: Safe code execution sandbox with subprocess/Docker/E2B backends
author: Molecule AI
skills:
  - code-sandbox
entry: workspace-template/sandbox.py
backends:
  default: subprocess
  available:
    - subprocess
    - docker
    - e2b
env_vars:
  - name: SANDBOX_BACKEND
    required: false
    default: subprocess
    description: Backend to use (subprocess|docker|e2b)
  - name: E2B_API_KEY
    required: false
    description: Required only when SANDBOX_BACKEND=e2b
